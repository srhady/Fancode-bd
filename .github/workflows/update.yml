name: Auto Update Playlist

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install Dependencies
        run: pip install requests pytz
        
      # আপনার প্রাইভেট রিপো (Sports) থেকে টোকেন দিয়ে কোড নিয়ে আসবে
      - name: Checkout Private Repo (Sports)
        uses: actions/checkout@v3
        with:
          repository: srhady/Sports
          token: ${{ secrets.PAT_TOKEN }}
          path: private_folder
          
      - name: Move Script
        run: mv private_folder/bot.py ./bot.py
        
      - name: Remove Private Folder
        run: rm -rf private_folder
        
      - name: Run Python Script
        run: python bot.py
        
      - name: Remove bot.py
        run: rm bot.py
        
      # নতুন প্লেলিস্টগুলো পাবলিক রিপোতে পুশ করবে (git add . দিয়েছি যাতে এরর না আসে)
      - name: Commit and Push Playlists
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git add .
          git commit -m "Auto update: Live Matches" || echo "No changes to commit"
          git push
